<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Style Preview — Rainbow Unicorn</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
  html,body{ height:100%; margin:0; overflow:hidden;
    font-family:"Comic Sans MS","Chalkboard","Baloo 2","Trebuchet MS",sans-serif;
    background:linear-gradient(160deg,#ffe3f0,#dff0ff); color:#3d3350; touch-action:manipulation; }
  #app{ height:100%; display:flex; flex-direction:column; }
  #topbar{ display:flex; align-items:center; gap:10px; padding:8px 12px; }
  #topbar .iconBtn{ width:48px; height:48px; border-radius:14px; border:none; background:#fffdfa;
    box-shadow:0 3px 0 rgba(0,0,0,.12); font-size:22px; cursor:pointer; }
  #title{ flex:1; text-align:center; font-weight:bold; font-size:clamp(15px,3vw,22px); text-shadow:0 2px 0 #fff; }
  #stage{ flex:1; min-height:0; display:flex; align-items:center; justify-content:center; padding:4px 8px; }
  #canvasWrap{ background:#fffdfa; border-radius:22px; box-shadow:0 8px 0 rgba(0,0,0,.10);
    padding:10px; display:flex; align-items:center; justify-content:center; max-height:100%; }
  #art{ display:block; max-width:100%; max-height:100%; height:auto; width:auto; border-radius:12px;
    image-rendering:auto; cursor:crosshair; }
  #palette{ display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap;
    padding:8px 10px calc(8px + env(safe-area-inset-bottom,0px)); }
  .swatch{ width:48px; height:48px; border-radius:50%; border:4px solid #fff;
    box-shadow:0 3px 0 rgba(0,0,0,.18); cursor:pointer; padding:0; }
  .swatch.selected{ border-color:#3d3350; transform:scale(1.12); }
  .swatch[data-hex="#ffffff"]{ border-color:#c9c4d6; }
  .sparkle-particle{ position:fixed; pointer-events:none; font-size:20px; z-index:30; animation:floatUp .85s ease-out forwards; }
  @keyframes floatUp{ 0%{ transform:translate(-50%,-50%) scale(.6); opacity:1; } 100%{ transform:translate(-50%,-140%) scale(1.3); opacity:0; } }
</style>
</head>
<body>
<div id="app">
  <header id="topbar">
    <button class="iconBtn" id="clearBtn" title="Clear">🧽</button>
    <div id="title">Style Preview — tap to paint!</div>
    <button class="iconBtn" id="muteBtn" title="Sound">🔊</button>
  </header>
  <main id="stage">
    <div id="canvasWrap"><canvas id="art" width="720" height="936"></canvas></div>
  </main>
  <footer id="palette"></footer>
</div>

<script>
(function(){
  "use strict";

  var PALETTE = [
    { name:"Red", hex:"#ff5a5a" }, { name:"Orange", hex:"#ff9d4d" }, { name:"Yellow", hex:"#ffd23f" },
    { name:"Green", hex:"#7ed957" }, { name:"Teal", hex:"#2dd4bf" }, { name:"Blue", hex:"#4d9de0" },
    { name:"Purple", hex:"#a78bfa" }, { name:"Pink", hex:"#ff8fc7" }, { name:"Sky", hex:"#bfe3ff" },
    { name:"Brown", hex:"#b08463" }, { name:"White", hex:"#ffffff" }, { name:"Gold", hex:"#ffd700" }
  ];
  var currentColor = PALETTE[7].hex; // pink default
  var muted = false;

  /* ---------- line-art builders (rounded coloring-book style) ---------- */
  var LINE = "#2a2733", SW = 6;
  function shape(d, sw){ return '<path d="'+d+'" fill="#ffffff" stroke="'+LINE+'" stroke-width="'+(sw||SW)+'" stroke-linejoin="round" stroke-linecap="round"/>'; }
  function line(d, sw){ return '<path d="'+d+'" fill="none" stroke="'+LINE+'" stroke-width="'+(sw||3)+'" stroke-linejoin="round" stroke-linecap="round"/>'; }
  function dot(cx,cy,r){ return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+LINE+'"/>'; }
  function circ(cx,cy,r,sw){ return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#ffffff" stroke="'+LINE+'" stroke-width="'+(sw||SW)+'"/>'; }

  function sun(x,y){
    var rays="";
    for(var i=0;i<12;i++){ var a=i*30*Math.PI/180;
      rays+=line('M '+(x+Math.cos(a)*54)+','+(y+Math.sin(a)*54)+' L '+(x+Math.cos(a)*74)+','+(y+Math.sin(a)*74), 4); }
    return rays + circ(x,y,46,SW) + dot(x-15,y-6,4.5) + dot(x+15,y-6,4.5) +
      line('M '+(x-15)+','+(y+10)+' Q '+x+','+(y+22)+' '+(x+15)+','+(y+10), 4);
  }

  function heart(x,y,s){
    return shape('M '+x+','+(y+7*s)+' C '+(x-10*s)+','+(y-6*s)+' '+(x-14*s)+','+(y-14*s)+' '+(x-6*s)+','+(y-16*s)+
      ' C '+(x-2*s)+','+(y-17*s)+' '+x+','+(y-12*s)+' '+x+','+(y-10*s)+
      ' C '+x+','+(y-12*s)+' '+(x+2*s)+','+(y-17*s)+' '+(x+6*s)+','+(y-16*s)+
      ' C '+(x+14*s)+','+(y-14*s)+' '+(x+10*s)+','+(y-6*s)+' '+x+','+(y+7*s)+' Z', 4);
  }
  function sparkle(x,y,s){
    return shape('M '+x+','+(y-s)+' C '+(x+s*0.28)+','+(y-s*0.28)+' '+(x+s*0.28)+','+(y-s*0.28)+' '+(x+s)+','+y+
      ' C '+(x+s*0.28)+','+(y+s*0.28)+' '+(x+s*0.28)+','+(y+s*0.28)+' '+x+','+(y+s)+
      ' C '+(x-s*0.28)+','+(y+s*0.28)+' '+(x-s*0.28)+','+(y+s*0.28)+' '+(x-s)+','+y+
      ' C '+(x-s*0.28)+','+(y-s*0.28)+' '+(x-s*0.28)+','+(y-s*0.28)+' '+x+','+(y-s)+' Z', 3.5);
  }

  function flower(x,y,s){
    s = s||1;
    var g='<g transform="translate('+x+','+y+') scale('+s+')">';
    // stem + two big leaves
    g+=line('M 0,30 L 0,116', 6);
    g+=shape('M 0,72 C -36,58 -58,76 -44,100 C -20,96 -6,86 0,72 Z');
    g+=shape('M 0,88 C 36,74 58,92 44,116 C 20,112 6,102 0,88 Z');
    // six big fat petals — each one an easy tap target
    for(var k=0;k<6;k++){
      g+='<g transform="rotate('+(k*60)+')"><ellipse cx="0" cy="-36" rx="16" ry="24" fill="#ffffff" stroke="'+LINE+'" stroke-width="'+SW+'" /></g>';
    }
    // big round center
    g+=circ(0,0,17,SW);
    return g+'</g>';
  }

  function mushroom(x,y,s){
    s=s||1;
    var g='<g transform="translate('+x+','+y+') scale('+s+')">';
    g+=shape('M -26,44 C -30,10 -34,6 -22,6 L 22,6 C 34,6 30,10 26,44 C 14,52 -14,52 -26,44 Z'); // stem
    g+=shape('M -52,6 C -52,-40 52,-40 52,6 C 30,20 -30,20 -52,6 Z'); // cap
    g+=circ(-24,-14,7,3.5); g+=circ(18,-20,8,3.5); g+=circ(30,-2,6,3.5); g+=circ(-6,-24,6,3.5);
    return g+'</g>';
  }

  function tree(x,y,s){
    s=s||1;
    var g='<g transform="translate('+x+','+y+') scale('+s+')">';
    g+=shape('M -14,80 L 14,80 L 10,18 L -10,18 Z'); // trunk
    g+=shape('M 0,-70 C -46,-70 -70,-40 -60,-8 C -84,4 -70,44 -34,40 C -20,58 20,58 34,40 C 70,44 84,4 60,-8 C 70,-40 46,-70 0,-70 Z'); // canopy
    g+=line('M -30,10 q 14,-10 0,-24 M 10,20 q 16,-8 4,-26 M -6,-8 q 14,-6 6,-24', 3);
    return g+'</g>';
  }

  function castle(x,y,s){
    s=s||1;
    var g='<g transform="translate('+x+','+y+') scale('+s+')">';
    // towers
    g+=shape('M -150,20 L -100,20 L -100,-120 L -150,-120 Z');
    g+=shape('M 100,20 L 150,20 L 150,-120 L 100,-120 Z');
    g+=shape('M -60,20 L 60,20 L 60,-150 L -60,-150 Z');
    g+=shape('M -100,20 L 100,20 L 100,-70 L -100,-70 Z'); // center keep front
    // cone roofs with spiral stripes
    g+=shape('M -155,-120 L -95,-120 L -125,-186 Z');
    g+=shape('M 95,-120 L 155,-120 L 125,-186 Z');
    g+=shape('M -66,-150 L 66,-150 L 0,-232 Z');
    g+=line('M -140,-138 L -110,-138 M -132,-156 L -118,-156', 3);
    g+=line('M 110,-138 L 140,-138 M 118,-156 L 132,-156', 3);
    g+=line('M -44,-172 L 44,-172 M -30,-196 L 30,-196 M -16,-214 L 16,-214', 3);
    // flags
    g+=line('M -125,-186 L -125,-210',3)+shape('M -125,-210 L -125,-198 L -108,-204 Z',3);
    g+=line('M 125,-186 L 125,-210',3)+shape('M 125,-210 L 125,-198 L 142,-204 Z',3);
    g+=line('M 0,-232 L 0,-258',3)+shape('M 0,-258 L 0,-244 L 20,-251 Z',3);
    // door + windows
    g+=shape('M -22,20 L -22,-34 A22,22 0 0 1 22,-34 L 22,20 Z');
    g+=line('M 0,20 L 0,-44',3);
    g+=circ(-125,-80,10,4); g+=circ(125,-80,10,4); g+=circ(0,-110,11,4);
    g+=line('M -135,-80 L -115,-80 M -125,-90 L -125,-70',3);
    g+=line('M 115,-80 L 135,-80 M 125,-90 L 125,-70',3);
    g+=line('M -11,-110 L 11,-110 M 0,-121 L 0,-99',3);
    // brick dots
    g+=dot(-130,-30,3)+dot(130,-30,3)+dot(-60,-50,3)+dot(60,-50,3)+dot(0,10,3);
    return g+'</g>';
  }

  // ---- the hero: a cute chibi unicorn (big head, small stubby body) ----
  function unicorn(x,y,s){
    s=s||1;
    var g='<g transform="translate('+x+','+y+') scale('+s+')">';
    // tail (behind body), a few big smooth curls
    g+=shape('M 60,118 C 112,104 136,148 118,182 C 142,196 132,240 98,228 C 118,206 112,180 96,176 C 112,158 96,130 76,138 C 92,124 78,110 60,118 Z');
    g+=line('M 80,132 C 106,152 114,188 100,216', 3.5);
    // stubby legs behind the body — only the rounded bottoms peek out
    g+=shape('M -84,150 h34 v92 a17,17 0 0 1 -34,0 Z');
    g+=shape('M -38,150 h34 v100 a17,17 0 0 1 -34,0 Z');
    g+=shape('M 6,150 h34 v100 a17,17 0 0 1 -34,0 Z');
    g+=shape('M 52,150 h34 v92 a17,17 0 0 1 -34,0 Z');
    g+=line('M -84,226 h34',3.5); g+=line('M -38,234 h34',3.5);
    g+=line('M 6,234 h34',3.5); g+=line('M 52,226 h34',3.5);
    // body drawn over the leg tops so the legs look attached
    g+=shape('M -70,60 C -92,140 -62,214 0,214 C 62,214 92,140 70,60 C 40,96 -40,96 -70,60 Z');
    // mane draped BEHIND the head — big soft curls around the left + a puff on the right
    g+=shape('M -30,-84 C -90,-112 -142,-72 -120,-24 C -150,2 -128,54 -94,58 C -108,86 -78,108 -54,88 C -44,70 -48,38 -52,12 C -56,-20 -50,-56 -30,-84 Z');
    g+=line('M -114,-16 C -88,-8 -70,-28 -60,-50', 3.5);
    g+=line('M -100,52 C -76,44 -64,16 -58,-8', 3.5);
    g+=shape('M 40,-86 C 88,-114 128,-84 112,-48 C 96,-68 68,-80 40,-86 Z');
    // ears
    g+=shape('M -60,-68 C -82,-92 -98,-84 -88,-56 C -78,-46 -64,-52 -60,-68 Z');
    g+=shape('M 60,-68 C 82,-92 98,-84 88,-56 C 78,-46 64,-52 60,-68 Z');
    // horn with spiral stripes (behind head)
    g+=shape('M -14,-78 L 4,-196 L 20,-76 Z');
    g+=line('M -8,-104 L 14,-100 M -3,-130 L 15,-126 M 2,-156 L 14,-153 M 6,-178 L 12,-176', 3);
    // big round head
    g+=shape('M 0,-88 C 56,-90 100,-56 100,-2 C 100,50 74,90 40,100 L -40,100 C -74,90 -100,50 -100,-2 C -100,-56 -56,-88 0,-88 Z');
    // forelock bangs across the forehead
    g+=shape('M -46,-80 C -56,-50 -30,-42 -24,-68 C -22,-44 6,-44 8,-68 C 12,-44 38,-48 34,-74 C 46,-56 52,-82 44,-90 C 10,-102 -20,-102 -46,-80 Z');
    // eyes with highlights + lashes
    g+='<ellipse cx="-40" cy="0" rx="14" ry="19" fill="'+LINE+'"/>';
    g+='<ellipse cx="40" cy="0" rx="14" ry="19" fill="'+LINE+'"/>';
    g+='<circle cx="-45" cy="-8" r="5" fill="#ffffff"/>';
    g+='<circle cx="35" cy="-8" r="5" fill="#ffffff"/>';
    g+=line('M -55,-16 L -64,-22 M -53,-23 L -60,-31', 2.5);
    g+=line('M 55,-16 L 64,-22 M 53,-23 L 60,-31', 2.5);
    // blush + nose + smile
    g+=circ(-56,34,13,3.5); g+=circ(56,34,13,3.5);
    g+=dot(-9,54,3); g+=dot(9,54,3);
    g+=line('M -17,66 Q 0,82 17,66', 3.5);
    return g+'</g>';
  }

  function buildScene(){
    var parts = '';
    parts += sun(96,110);
    // horizon — one gentle rolling hill line; everything stands ON it
    parts += line('M 6,560 C 130,542 250,572 360,560 C 480,548 600,576 714,558', 5);
    // trees planted on the horizon (trunk bottoms touch the line)
    parts += tree(92,468,1.05);
    parts += tree(628,468,1.05);
    // castle sits on the hill, drawn after the line so its base covers it
    parts += castle(360,542,0.85);
    // big easy-petal flowers in the grass
    parts += flower(105,690,1.0);
    parts += flower(615,690,1.0);
    parts += flower(205,815,0.8);
    parts += flower(515,815,0.8);
    // hero unicorn front and center on the grass
    parts += unicorn(360,590,1.0);
    // mushrooms + accents
    parts += mushroom(84,884,0.9);
    parts += mushroom(646,884,0.9);
    // little grass tufts so the ground reads as grass
    parts += line('M 120,600 q 5,-14 10,0 M 560,606 q 5,-14 10,0 M 300,880 q 5,-14 10,0 M 430,896 q 5,-14 10,0', 3);
    parts += sparkle(300,150,14) + sparkle(470,120,10) + sparkle(560,220,12);
    parts += heart(180,270,1.4) + heart(545,270,1.2);
    parts += sparkle(150,760,10) + sparkle(570,770,11);
    return '<svg xmlns="http://www.w3.org/2000/svg" width="720" height="936" viewBox="0 0 720 936">' +
      '<rect x="0" y="0" width="720" height="936" fill="#ffffff"/>' +
      '<rect x="6" y="6" width="708" height="924" rx="18" fill="none" stroke="'+LINE+'" stroke-width="5"/>' +
      parts + '</svg>';
  }

  /* ---------- flood-fill engine ---------- */
  var canvas = document.getElementById("art");
  var ctx = canvas.getContext("2d", { willReadFrequently:true });
  var W = canvas.width, H = canvas.height;
  var wallMask = null;      // Uint8Array: 1 = black line (never fill)
  var imgData = null;
  var taps = [];            // {x,y,color} in canvas pixel coords, for redraw

  function hexToRgb(hex){
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  function renderLineArt(cb){
    var svg = buildScene();
    var img = new Image();
    img.onload = function(){
      ctx.clearRect(0,0,W,H);
      ctx.drawImage(img,0,0,W,H);
      imgData = ctx.getImageData(0,0,W,H);
      computeWallMask();
      if (cb) cb();
    };
    img.src = "data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(svg)));
  }

  function computeWallMask(){
    var d = imgData.data;
    wallMask = new Uint8Array(W*H);
    for (var i=0;i<W*H;i++){
      var p=i*4;
      var lum = 0.299*d[p] + 0.587*d[p+1] + 0.114*d[p+2];
      if (lum < 110) wallMask[i] = 1;
    }
  }

  function floodFill(sx, sy, rgb){
    if (sx<0||sy<0||sx>=W||sy>=H) return false;
    var d = imgData.data;
    var seedIdx = sy*W+sx;
    if (wallMask[seedIdx]) return false;
    var sp = seedIdx*4;
    var sr=d[sp], sg=d[sp+1], sb=d[sp+2];
    if (sr===rgb[0] && sg===rgb[1] && sb===rgb[2]) return false;
    var tol = 40;
    function match(i){
      if (wallMask[i]) return false;
      var p=i*4;
      return Math.abs(d[p]-sr)<=tol && Math.abs(d[p+1]-sg)<=tol && Math.abs(d[p+2]-sb)<=tol;
    }
    var stack=[[sx,sy]];
    while(stack.length){
      var pt=stack.pop(); var px=pt[0], py=pt[1];
      while(px>=0 && match(py*W+px)) px--;
      px++;
      var up=false, dn=false;
      while(px<W && match(py*W+px)){
        var ci=py*W+px, cp=ci*4;
        d[cp]=rgb[0]; d[cp+1]=rgb[1]; d[cp+2]=rgb[2]; d[cp+3]=255;
        if(py>0){ if(match((py-1)*W+px)){ if(!up){ stack.push([px,py-1]); up=true; } } else up=false; }
        if(py<H-1){ if(match((py+1)*W+px)){ if(!dn){ stack.push([px,py+1]); dn=true; } } else dn=false; }
        px++;
      }
    }
    return true;
  }

  function applyTap(sx, sy, hex, record){
    var rgb = hexToRgb(hex);
    var changed = floodFill(sx, sy, rgb);
    if (changed){
      ctx.putImageData(imgData, 0, 0);
      if (record) taps.push({x:sx, y:sy, color:hex});
    }
    return changed;
  }

  function eventToPixel(e){
    var rect = canvas.getBoundingClientRect();
    var cx = (e.touches ? e.touches[0].clientX : e.clientX);
    var cy = (e.touches ? e.touches[0].clientY : e.clientY);
    var x = Math.round((cx - rect.left) / rect.width * W);
    var y = Math.round((cy - rect.top) / rect.height * H);
    return { x:x, y:y, clientX:cx, clientY:cy };
  }

  canvas.addEventListener("click", function(e){
    var p = eventToPixel(e);
    var changed = applyTap(p.x, p.y, currentColor, true);
    if (changed){ tapSound(); spawnSparkle(p.clientX, p.clientY); }
  });

  /* ---------- sound + sparkle ---------- */
  var audioCtx=null;
  function ensureAudio(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return audioCtx; }
  function tapSound(){ if(muted) return; var c=ensureAudio(); if(!c) return;
    try{ var o=c.createOscillator(), g=c.createGain(); o.type="sine"; o.frequency.value=560+Math.random()*220;
      o.connect(g); g.connect(c.destination); var n=c.currentTime;
      g.gain.setValueAtTime(0.0001,n); g.gain.exponentialRampToValueAtTime(0.2,n+0.01); g.gain.exponentialRampToValueAtTime(0.0001,n+0.18);
      o.start(n); o.stop(n+0.2); }catch(e){} }
  function spawnSparkle(x,y){ var el=document.createElement("div"); el.className="sparkle-particle";
    el.style.left=x+"px"; el.style.top=y+"px"; el.textContent="✨"; document.body.appendChild(el);
    setTimeout(function(){ el.remove(); },900); }

  /* ---------- palette UI ---------- */
  var paletteEl = document.getElementById("palette");
  PALETTE.forEach(function(c, idx){
    var b=document.createElement("button");
    b.className="swatch"+(c.hex===currentColor?" selected":"");
    b.style.background=c.hex; b.setAttribute("data-hex",c.hex); b.setAttribute("aria-label",c.name);
    b.addEventListener("click", function(){
      currentColor=c.hex;
      paletteEl.querySelectorAll(".swatch").forEach(function(s){ s.classList.remove("selected"); });
      b.classList.add("selected");
    });
    paletteEl.appendChild(b);
  });

  document.getElementById("clearBtn").addEventListener("click", function(){ taps=[]; renderLineArt(); });
  document.getElementById("muteBtn").addEventListener("click", function(e){
    muted=!muted; e.target.textContent = muted ? "🔇" : "🔊"; });
  document.body.addEventListener("click", function(){ ensureAudio(); }, { once:true });

  /* ---------- boot ---------- */
  renderLineArt();
})();
</script>
</body>
</html>
